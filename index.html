<!DOCTYPE html>
<html>
<head>  
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <script src="scripts/cat.js"></script>
</head>
<body>
    <img src="Screenshot 2026-05-10 at 8.23.45 PM.png" alt="" style="width: 30rem;">

    <div class="container">
        <div class="sidebar">
            <div> 
                <h1 class="sidebar-logo accent">Stratum</h1>
            </div>
            <div class="sidebar-cat">
                <div class="sidebar-cat__card column" data-open="true">
                    <div class="row sidebar-cat__header">
                        <h3 class="sidebar-cat__lead">Genre</h3>
                        <span class="sidebar-cat__arrow">▶</span>
                    </div>
                    <ul class="sidebar-tag__list column">
                        <li>melodic house</li>
                        <li>techno</li>
                        <li>ambient</li>
                    </ul>
                </div>
                <div class="sidebar-cat__card column" data-open="true">
                    <div class="row sidebar-cat__header">
                        <h3 class="sidebar-cat__lead">Era</h3>
                        <span class="sidebar-cat__arrow">▶</span>
                    </div>
                    <ul class="sidebar-tag__list column">
                        <li>2000s</li>
                        <li>2010s</li>
                        <li>2020s</li>
                    </ul>
                </div>
                <div class="sidebar-cat__card column" data-open="false">
                    <div class="row sidebar-cat__header">
                        <h3 class="sidebar-cat__lead">Language</h3>
                        <span class="sidebar-cat__arrow">▶</span>
                    </div>
                    <ul class="sidebar-tag__list column">
                        <li>English</li>
                        <li>Spanish</li>
                        <li>Russian</li>
                    </ul>
                </div>

                <div class="sidebar-cat__card column" data-open="true">
                    <div class="row sidebar-cat__header">
                        <h3 class="sidebar-cat__lead">Title</h3>
                        <span class="sidebar-cat__arrow">▶</span>
                    </div>
                    <ul class="sidebar-tag__list column">
                        <li>rock
                            <ul>
                                <li>classic rock</li>
                            </ul>
                        </li>
                        <li>item 2</li>
                        <li>item 3</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
